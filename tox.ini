; Main configuration for running tests with the CI pipeline
; Currently configured to run tests with AA4 (=Django 4.2)

[flake8]
exclude = .git, *migrations*, .tox, dist, htmlcov, Planning
max-line-length = 88
select = C,E,F,W,B,B950
ignore = E203, E231, E501, W503, W291, W293

[tox]
envlist = {py310, py311}-django{42}, pylint

[testenv]
setenv =
    DJANGO_SETTINGS_MODULE = testauth.settings.local

deps=
    allianceauth>=4.0.0a4
    coverage

commands_pre=
    pip list

commands=
    coverage run runtests.py lawnfleet -v 2
    coverage xml
    coverage report -m

[testenv:pylint]
deps=
    pylint
    pylint-django

commands=
    pylint --load-plugins pylint_django lawnfleet
